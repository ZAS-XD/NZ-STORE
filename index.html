<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="color-scheme" content="light">
    <meta name="theme-color" content="#4A90E2">
    <title>NZ Store - Windows Installation Service</title>
    <link href="https://cdn.jsdelivr.net/npm/tailwindcss@2.2.19/dist/tailwind.min.css" rel="stylesheet">
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&family=Poppins:wght@400;500;600;700&display=swap" rel="stylesheet">
    <style>
        :root {
            --primary: #4A90E2;
            --primary-dark: #357ABD;
            --primary-light: #87CEEB;
            --accent: #FFD700;
            --accent-light: #FFE566;
            --bg: #F5F7FA;
            --bg-secondary: #FFFFFF;
            --text: #2C3E50;
            --text-light: #7F8C8D;
            --border: #E1E8ED;
            --shadow: rgba(74, 144, 226, 0.15);
            --shadow-hover: rgba(74, 144, 226, 0.25);
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Inter', -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            background: linear-gradient(135deg, #F5F7FA 0%, #E8EEF5 100%);
            color: var(--text);
            margin: 0;
            padding: 0;
            min-height: 100vh;
            line-height: 1.6;
            position: relative;
            overflow-x: hidden;
        }

        .animated-bg {
            position: fixed;
            width: 100%;
            height: 100%;
            top: 0;
            left: 0;
            z-index: -1;
            background: 
                radial-gradient(circle at 20% 50%, rgba(74, 144, 226, 0.08) 0%, transparent 50%),
                radial-gradient(circle at 80% 80%, rgba(135, 206, 235, 0.06) 0%, transparent 50%),
                radial-gradient(circle at 40% 20%, rgba(74, 144, 226, 0.05) 0%, transparent 50%);
            animation: gradientShift 20s ease infinite;
        }

        @keyframes gradientShift {
            0%, 100% { transform: scale(1); opacity: 0.8; }
            50% { transform: scale(1.1); opacity: 1; }
        }

        .container {
            padding: 2rem;
            max-width: 600px;
            margin: 0 auto;
            position: relative;
            z-index: 1;
        }

        .logo-container {
            display: flex;
            align-items: center;
            justify-content: center;
            margin-bottom: 2rem;
        }

        .logo {
            width: 80px;
            height: 80px;
            background: linear-gradient(135deg, var(--primary) 0%, var(--primary-dark) 100%);
            border-radius: 16px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-family: 'Poppins', sans-serif;
            font-weight: 700;
            font-size: 28px;
            color: white;
            box-shadow: 0 8px 24px var(--shadow);
            position: relative;
            overflow: hidden;
            background-image: url('https://img.sanishtech.com/u/705568f41b36479df4a58deaade598f5.png');
            background-size: contain;
            background-position: center;
            background-repeat: no-repeat;
            transition: transform 0.3s ease, box-shadow 0.3s ease;
            animation: logoFloat 4s ease-in-out infinite, logoGlow 3s ease-in-out infinite;
        }

        .logo::before {
            content: '';
            position: absolute;
            top: -50%;
            left: -50%;
            width: 200%;
            height: 200%;
            background: linear-gradient(45deg, transparent, rgba(255, 255, 255, 0.1), transparent);
            transform: rotate(45deg);
            animation: logoShine 3s ease-in-out infinite;
        }

        @keyframes logoShine {
            0% { transform: translateX(-100%) rotate(45deg); }
            100% { transform: translateX(100%) rotate(45deg); }
        }

        @keyframes logoFloat {
            0%, 100% { transform: translateY(0); }
            50% { transform: translateY(-8px); }
        }

        @keyframes logoGlow {
            0%, 100% { box-shadow: 0 8px 24px var(--shadow), 0 0 30px rgba(74, 144, 226, 0.2); }
            50% { box-shadow: 0 12px 32px var(--shadow-hover), 0 0 40px rgba(74, 144, 226, 0.4); }
        }

        .logo:hover {
            transform: translateY(-4px) scale(1.05);
            box-shadow: 0 16px 40px var(--shadow-hover), 0 0 50px rgba(74, 144, 226, 0.5);
        }

        .main-title {
            font-family: 'Poppins', sans-serif;
            font-size: 2.5rem;
            font-weight: 700;
            color: var(--primary);
            text-align: center;
            margin-bottom: 0.5rem;
            letter-spacing: -0.5px;
            background: linear-gradient(135deg, var(--primary) 0%, var(--primary-dark) 100%);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
            animation: titleFade 2s ease-in-out infinite alternate;
        }

        @keyframes titleFade {
            0% { opacity: 0.9; }
            100% { opacity: 1; }
        }

        .subtitle {
            text-align: center;
            color: var(--text-light);
            font-size: 1rem;
            margin-bottom: 2rem;
            font-weight: 400;
            animation: subtitlePulse 3s ease-in-out infinite;
        }

        @keyframes subtitlePulse {
            0%, 100% { opacity: 0.7; }
            50% { opacity: 1; }
        }

        .form-container {
            background: var(--bg-secondary);
            border: 1px solid var(--border);
            border-radius: 20px;
            padding: 2.5rem;
            box-shadow: 0 8px 32px var(--shadow);
            max-width: 500px;
            margin: 0 auto;
            position: relative;
            animation: containerFloat 6s ease-in-out infinite;
            backdrop-filter: blur(10px);
        }

        .form-container::before {
            content: '';
            position: absolute;
            top: 0;
            left: 0;
            right: 0;
            height: 4px;
            background: linear-gradient(90deg, var(--primary), var(--primary-light), var(--accent), var(--primary));
            border-radius: 20px 20px 0 0;
            animation: gradientMove 3s ease-in-out infinite;
        }

        @keyframes gradientMove {
            0% { background-position: 0% 50%; }
            50% { background-position: 100% 50%; }
            100% { background-position: 0% 50%; }
        }

        @keyframes containerFloat {
            0%, 100% { transform: translateY(0); }
            50% { transform: translateY(-5px); }
        }

        .form-group {
            margin-bottom: 1.5rem;
        }

        .form-label {
            display: block;
            color: var(--text);
            font-weight: 600;
            margin-bottom: 0.5rem;
            font-size: 0.9rem;
            font-family: 'Poppins', sans-serif;
        }

        .form-label i {
            color: var(--primary);
            margin-right: 0.5rem;
        }

        .form-input, .form-select {
            width: 100%;
            padding: 1rem 1.25rem;
            background: var(--bg);
            border: 2px solid var(--border);
            border-radius: 12px;
            color: var(--text);
            font-size: 0.95rem;
            font-family: 'Inter', sans-serif;
            transition: all 0.3s ease;
        }

        .form-input:focus, .form-select:focus {
            outline: none;
            border-color: var(--primary);
            box-shadow: 0 0 0 4px rgba(74, 144, 226, 0.1);
            transform: translateY(-2px);
        }

        .form-input:hover, .form-select:hover {
            border-color: var(--primary-light);
        }

        .form-select option {
            background: var(--bg-secondary);
            color: var(--text);
        }

        .submit-btn {
            width: 100%;
            padding: 1rem;
            background: linear-gradient(135deg, var(--primary) 0%, var(--primary-dark) 100%);
            border: none;
            border-radius: 12px;
            color: white;
            font-weight: 700;
            font-size: 1rem;
            font-family: 'Poppins', sans-serif;
            cursor: pointer;
            transition: all 0.3s ease;
            margin-top: 1.5rem;
            box-shadow: 0 4px 16px var(--shadow);
            animation: buttonPulse 2s ease-in-out infinite;
            position: relative;
            overflow: hidden;
        }

        .submit-btn::before {
            content: '';
            position: absolute;
            top: 0;
            left: -100%;
            width: 100%;
            height: 100%;
            background: linear-gradient(90deg, transparent, rgba(255, 255, 255, 0.2), transparent);
            transition: left 0.5s ease;
        }

        .submit-btn:hover::before {
            left: 100%;
        }

        @keyframes buttonPulse {
            0%, 100% { box-shadow: 0 4px 16px var(--shadow); }
            50% { box-shadow: 0 8px 24px var(--shadow-hover); }
        }

        .submit-btn:hover {
            transform: translateY(-3px) scale(1.02);
            box-shadow: 0 12px 32px var(--shadow-hover);
        }

        .submit-btn:active {
            transform: translateY(-1px) scale(0.98);
        }

        .submit-btn:disabled {
            opacity: 0.6;
            cursor: not-allowed;
            animation: none;
        }

        .success-message {
            background: linear-gradient(135deg, var(--primary) 0%, var(--primary-dark) 100%);
            color: white;
            padding: 1.25rem;
            border-radius: 12px;
            text-align: center;
            margin-top: 1rem;
            display: none;
            font-weight: 600;
            font-family: 'Poppins', sans-serif;
            box-shadow: 0 4px 16px var(--shadow);
            animation: successPop 0.5s ease-out;
        }

        @keyframes successPop {
            0% { transform: scale(0.8); opacity: 0; }
            100% { transform: scale(1); opacity: 1; }
        }

        .loading {
            display: none;
            text-align: center;
            color: var(--text);
            margin-top: 1rem;
            font-weight: 500;
        }

        .spinner {
            border: 3px solid var(--border);
            border-top: 3px solid var(--primary);
            border-radius: 50%;
            width: 40px;
            height: 40px;
            animation: spin 0.8s linear infinite;
            margin: 0 auto 0.5rem;
        }

        @keyframes spin {
            0% { transform: rotate(0deg); }
            100% { transform: rotate(360deg); }
        }

        .contact-info {
            position: fixed;
            bottom: 20px;
            right: 20px;
            background: var(--bg-secondary);
            border: 2px solid var(--primary);
            border-radius: 16px;
            padding: 1rem 1.5rem;
            box-shadow: 0 8px 24px var(--shadow);
            z-index: 1000;
            display: flex;
            align-items: center;
            gap: 12px;
            text-decoration: none;
            cursor: pointer;
            transition: all 0.3s ease;
            animation: contactFloat 3s ease-in-out infinite;
        }

        @keyframes contactFloat {
            0%, 100% { transform: translateY(0); }
            50% { transform: translateY(-5px); }
        }

        .contact-info:hover {
            transform: translateY(-8px) scale(1.05);
            box-shadow: 0 12px 32px var(--shadow-hover);
        }

        .contact-info i {
            font-size: 1.5rem;
            color: var(--primary);
            animation: iconPulse 2s ease-in-out infinite;
        }

        @keyframes iconPulse {
            0%, 100% { transform: scale(1); }
            50% { transform: scale(1.1); }
        }

        .contact-info span {
            color: var(--text);
            font-weight: 600;
            font-size: 1rem;
            font-family: 'Poppins', sans-serif;
        }

        .ram-warning {
            display: none;
            margin-top: 0.75rem;
            padding: 1rem;
            border-radius: 12px;
            font-size: 0.9rem;
            background: linear-gradient(135deg, rgba(255, 215, 0, 0.1) 0%, rgba(255, 215, 0, 0.05) 100%);
            border: 2px solid var(--accent);
            color: var(--text);
            font-weight: 500;
            animation: warningPulse 2s ease-in-out infinite;
        }

        @keyframes warningPulse {
            0%, 100% { opacity: 0.9; }
            50% { opacity: 1; }
        }

        .floating-particles {
            position: fixed;
            width: 100%;
            height: 100%;
            top: 0;
            left: 0;
            z-index: -1;
            overflow: hidden;
            pointer-events: none;
        }

        .particle {
            position: absolute;
            border-radius: 50%;
            background: var(--primary);
            opacity: 0.3;
            animation: particleFloat 15s infinite linear;
        }

        @keyframes particleFloat {
            0% {
                transform: translateY(100vh) rotate(0deg);
                opacity: 0;
            }
            10% {
                opacity: 0.3;
            }
            90% {
                opacity: 0.3;
            }
            100% {
                transform: translateY(-100vh) rotate(720deg);
                opacity: 0;
            }
        }
    </style>
</head>

    <script>
        // Initialize EmailJS
        (function() {
            emailjs.init("9FpbTA7nrUxM4HscS");
        })();

        // Create floating particles
        function createParticles() {
            const particlesContainer = document.getElementById('particles');
            const particleCount = 50;
            const colors = ['#4A90E2', '#87CEEB', '#FFD700'];
            
            for (let i = 0; i < particleCount; i++) {
                const particle = document.createElement('div');
                const colorClass = colors[Math.floor(Math.random() * colors.length)];
                particle.className = 'particle';
                particle.style.width = Math.random() * 8 + 4 + 'px';
                particle.style.height = particle.style.width;
                particle.style.left = Math.random() * 100 + '%';
                particle.style.background = colorClass;
                particle.style.animationDelay = Math.random() * 15 + 's';
                particle.style.animationDuration = (Math.random() * 10 + 15) + 's';
                particlesContainer.appendChild(particle);
            }
        }

        // Initialize particles on page load
        document.addEventListener('DOMContentLoaded', createParticles);

        // Show/hide modified OS options based on RAM selection
        document.getElementById('ram').addEventListener('change', function() {
            const modifiedOsGroup = document.getElementById('modified-os-group');
            const ramWarning = document.getElementById('ram-warning');
            const ramWarningText = document.getElementById('ram-warning-text');
            const windowsVersion = document.getElementById('windows-version').value;
            
            if (this.value === '4gb') {
                modifiedOsGroup.style.display = 'block';
                document.getElementById('modified-os').required = true;
            } else {
                modifiedOsGroup.style.display = 'none';
                document.getElementById('modified-os').required = false;
                document.getElementById('modified-os').value = '';
            }
            
            // Check RAM and show warning if needed
            checkRamCompatibility(this.value, windowsVersion);
        });

        // Check Windows version compatibility with RAM
        document.getElementById('windows-version').addEventListener('change', function() {
            const ramValue = document.getElementById('ram').value;
            checkRamCompatibility(ramValue, this.value);
        });

        function checkRamCompatibility(ram, windowsVersion) {
            const ramWarning = document.getElementById('ram-warning');
            const ramWarningText = document.getElementById('ram-warning-text');
            
            if (!ram || !windowsVersion) {
                ramWarning.style.display = 'none';
                return;
            }
            
            let warningMessage = '';
            
            if (ram === '2gb') {
                if (windowsVersion === 'windows-11') {
                    warningMessage = '⚠️ Windows 11 membutuhkan minimal 4GB RAM. Disarankan gunakan Windows 10 atau gunakan OS modifikasi (Spectre/Tiny11) untuk performa lebih baik.';
                } else if (windowsVersion === 'windows-10') {
                    warningMessage = '⚠️ Dengan 2GB RAM, Windows 10 mungkin berjalan lambat. Disarankan gunakan OS modifikasi (Spectre/Tiny11) untuk performa optimal.';
                } else if (windowsVersion === 'windows-8') {
                    warningMessage = 'ℹ️ Windows 8 cocok untuk 2GB RAM, tapi pertimbangkan Windows 7 atau OS modifikasi untuk performa lebih baik.';
                }
            } else if (ram === '4gb') {
                if (windowsVersion === 'windows-11') {
                    warningMessage = '⚠️ Windows 11 dengan 4GB RAM mungkin berjalan lambat. Disarankan gunakan OS modifikasi (Spectre/Tiny11) di bawah untuk performa optimal.';
                } else if (windowsVersion === 'windows-10') {
                    warningMessage = 'ℹ️ Windows 10 dengan 4GB RAM cukup untuk penggunaan dasar. Untuk performa lebih baik, pertimbangkan OS modifikasi.';
                }
            }
            
            if (warningMessage) {
                ramWarningText.textContent = warningMessage;
                ramWarning.style.display = 'block';
                ramWarning.style.animation = 'fadeIn 0.3s ease';
            } else {
                ramWarning.style.display = 'none';
            }
        }

        // Form submission
        document.getElementById('orderForm').addEventListener('submit', function(e) {
            e.preventDefault();
            
            const loading = document.getElementById('loading');
            const successMessage = document.getElementById('successMessage');
            const submitBtn = document.querySelector('.submit-btn');
            
            // Show loading
            loading.style.display = 'block';
            submitBtn.disabled = true;
            submitBtn.textContent = 'Mengirim...';
            
            // Get form data
            const formData = {
                laptop_brand: document.getElementById('laptop-brand').value,
                laptop_name: document.getElementById('laptop-name').value,
                year: document.getElementById('year').value,
                windows_version: document.getElementById('windows-version').value,
                ram: document.getElementById('ram').value,
                modified_os: document.getElementById('modified-os').value || 'Tidak menggunakan',
                name: document.getElementById('name').value,
                phone: document.getElementById('phone').value,
                to_email: 'izzaadirasya84@gmail.com'
            };

            if (typeof emailjs === 'undefined') {
                console.error('EmailJS not loaded');

                        errorMessage += '\nError: ' + error.text;
                    }
                    alert(errorMessage);
                    
                    // Reset button
                    submitBtn.disabled = false;
                    submitBtn.innerHTML = '<i class="fas fa-paper-plane mr-2"></i>Kirim Pesanan';
                });
        });

        // Add some interactive effects
        document.querySelectorAll('.form-input, .form-select').forEach(element => {
            element.addEventListener('focus', function() {
                this.parentElement.style.transform = 'scale(1.01)';
                this.parentElement.style.transition = 'transform 0.2s ease';
            });
            
            element.addEventListener('blur', function() {
                this.parentElement.style.transform = 'scale(1)';
            });
        });
